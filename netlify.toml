# Netlify Configuration for ISN.BIZ Website
[build]
  publish = "."
  command = "echo 'Static site - no build required'"

[build.environment]
  NODE_VERSION = "18"

# Redirect rules
[[redirects]]
  from = "/team"
  to = "/#team"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/portfolio.html"
  status = 200

[[redirects]]
  from = "/investors"
  to = "/investors.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# Team / founder pages
[[redirects]]
  from = "/jonathan"
  to = "/jonathan.html"
  status = 200

[[redirects]]
  from = "/lilly"
  to = "/lilly.html"
  status = 200

[[redirects]]
  from = "/bri"
  to = "/bri.html"
  status = 200

# Project / product pages
[[redirects]]
  from = "/opportunity-bot"
  to = "/opportunity-bot.html"
  status = 200

[[redirects]]
  from = "/patchworthy"
  to = "/patchworthy.html"
  status = 200

[[redirects]]
  from = "/bin-intelligence"
  to = "/bin-intelligence.html"
  status = 200

[[redirects]]
  from = "/spiritatlas"
  to = "/spiritatlas.html"
  status = 200

[[redirects]]
  from = "/gedfix"
  to = "/gedfix.html"
  status = 200

[[redirects]]
  from = "/phantom-browser"
  to = "/phantom-browser.html"
  status = 200

[[redirects]]
  from = "/llm-security-research"
  to = "/llm-security-research.html"
  status = 200

[[redirects]]
  from = "/claims"
  to = "/claims.html"
  status = 200

[[redirects]]
  from = "/hroc-files"
  to = "/hroc-files.html"
  status = 200

# Notion OAuth callback
[[redirects]]
  from = "/auth/notion/callback"
  to = "/auth/notion/callback"
  status = 200

# Legal pages
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
