# Netlify Configuration for ISN.BIZ Website
[build]
  publish = "."
  command = "echo 'Static site - no build required'"

[build.environment]
  NODE_VERSION = "18"

# Redirect rules
[[redirects]]
  from = "/team"
  to = "/#team"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/portfolio.html"
  status = 200

[[redirects]]
  from = "/investors"
  to = "/investors.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# Team / founder pages
[[redirects]]
  from = "/jonathan"
  to = "/jonathan.html"
  status = 200

[[redirects]]
  from = "/lilly"
  to = "/lilly.html"
  status = 200

[[redirects]]
  from = "/bri"
  to = "/bri.html"
  status = 200

[[redirects]]
  from = "/alicia"
  to = "/alicia.html"
  status = 200

# Project / product pages
[[redirects]]
  from = "/opportunity-bot"
  to = "/opportunity-bot.html"
  status = 200

[[redirects]]
  from = "/truenas"
  to = "/truenas.html"
  status = 200

[[redirects]]
  from = "/bin-intelligence"
  to = "/bin-intelligence.html"
  status = 200

[[redirects]]
