name: Emergency Netlify Redeploy

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Netlify Site Inventory
        run: |
          set -e
          echo "Current user"
          netlify api getCurrentUser | jq '{email, site_count, account_id}'
          echo "All sites"
          netlify api listSites | jq '.[] | {name, custom_domain, default_domain, disabled, disabled_reason, lifecycle_state, updated_at}'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
