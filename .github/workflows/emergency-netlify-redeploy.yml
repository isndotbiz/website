name: Emergency Netlify Redeploy

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Netlify Diagnostics
        run: |
          set -e
          echo "Current user"
          netlify api getCurrentUser | jq '{email, site_count, account_id}'
          echo "Target site"
          netlify api getSite --data '{"site_id":"'"$NETLIFY_SITE_ID"'"}' | jq '{name, custom_domain, default_domain, disabled, disabled_reason, lifecycle_state, updated_at}'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Force Production Deploy
        run: |
          netlify deploy \
            --prod \
            --dir=. \
            --site "$NETLIFY_SITE_ID" \
            --message "Emergency redeploy from workflow run $GITHUB_RUN_ID"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
