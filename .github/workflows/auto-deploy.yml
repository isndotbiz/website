name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          node scripts/preview-server.js > /tmp/preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "preview server up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sI http://localhost:8080/ | head -1

      - name: Run tests
        run: npx playwright test --reporter=html
        env:
          BASE_URL: http://localhost:8080

      - name: Stop preview server
        if: always()
        run: kill $(cat /tmp/preview.pid) 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && success()
        run: npx wrangler pages deploy . --project-name isnbiz-website --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
